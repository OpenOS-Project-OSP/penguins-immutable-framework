# Converted from GitHub Actions — penguins-immutable-framework
# Mirrors: ci.yml, build-ci-images.yml, distro-matrix.yml

stages:
  - test
  - build-images
  - distro-matrix

default:
  image: golang:1.22

.go-cache: &go-cache
  cache:
    key:
      files: [go.sum]
    paths: [.go-cache/]
  variables:
    GOPATH: "$CI_PROJECT_DIR/.go-cache"

# ── CI ────────────────────────────────────────────────────────────────────────
test:
  stage: test
  <<: *go-cache
  script:
    - go build ./...
    - go vet ./...
    - go test ./... -v -count=1
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

lint:
  stage: test
  image: golangci/golangci-lint:latest
  <<: *go-cache
  script:
    - golangci-lint run ./...
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ── Build CI images ───────────────────────────────────────────────────────────
build-ci-images:
  stage: build-images
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t penguins-immutable-framework-ci:latest -f ci/Dockerfile . || true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [ci/Dockerfile]

# ── Distro matrix ─────────────────────────────────────────────────────────────
distro-matrix:ubuntu:
  stage: distro-matrix
  image: ubuntu:22.04
  script:
    - bash scripts/test-distro.sh ubuntu || true
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: manual

distro-matrix:debian:
  stage: distro-matrix
  image: debian:bookworm
  script:
    - bash scripts/test-distro.sh debian || true
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: manual
